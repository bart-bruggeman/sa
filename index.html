<!DOCTYPE html>
<html lang="nl" data-bs-theme="light">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SA</title>
	<!-- favicon -->
	<link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
	<!-- Bootstrap -->
	<link rel="stylesheet" href="assets/css/bootstrap.min.css" />
	<link rel="stylesheet" href="assets/css/bootstrap-icons.min.css"/>
	<!-- bookmarks -->
	<link rel="stylesheet" href="assets/css/sa.css"/>
</head>
<body>
	<!-- navbar -->
	<nav class="navbar navbar-expand-lg navbar-light py-2 border-bottom">
		<div class="container d-flex justify-content-between align-items-center">
			<span class="navbar-brand mb-0 h1">SA</span>
			<div class="form-check form-switch d-flex align-items-center">
				<a href="#" class="nav-link p-0" id="themeToggleLink" role="button" style="line-height: 1;">
					<i class="bi bi-toggle-off fs-5" style="vertical-align: middle;"></i>
				</a>			
			</div>
		</div>
	</nav>
	<!-- sections container -->
	<div class="container mt-5" id="section-container"></div>
	<!-- Offcanvas right/full pane -->
	<div class="offcanvas offcanvas-end" tabindex="-1" id="linkPane" data-bs-scroll="true" data-bs-backdrop="true">
		<div class="offcanvas-header">
			<h5 class="offcanvas-title" id="linkPaneLabel">Link info</h5>
			<button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
		</div>
		<div class="offcanvas-body">
			<p class="pane-name"><span id="paneName"></span></p>
			<p class="pane-category"><span id="paneCategory"></span> - <span id="paneSubcategory"></span></p>
			<hr/>
			<p><strong>Website:</strong> <a href="#" target="_blank" id="paneUrl">Visit</a></p>
			<p><strong>Address:</strong> <span id="paneAddress"></span></p>
			<p><strong>Phone:</strong> <span id="panePhone"></span></p>
			<p><strong>Email:</strong> <span id="paneMail"></span></p>
		</div>
	</div>
	<!-- Scripts -->
	<script src="assets/js/bootstrap.bundle.min.js"></script>
	<script src="assets/js/sa-data.js"></script>
	<script src="assets/js/sa.js"></script>
</body>
</html>
