<!DOCTYPE html>
<html lang="nl" data-bs-theme="light">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>South Africa - Gordon's Bay, Western Cape</title>
	<!-- favicon -->
	<link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
	<!-- Bootstrap 5.3.8 -->
	<link rel="stylesheet" href="assets/css/bootstrap.min.css" />
	<!-- Bootstrap icons 1.13.1 -->
	<link rel="stylesheet" href="assets/css/bootstrap-icons.min.css"/>
	<!-- site stylesheet -->
	<link rel="stylesheet" href="assets/css/colors.css"/>
	<link rel="stylesheet" href="assets/css/navbar-search.css"/>
	<link rel="stylesheet" href="assets/css/section.css"/>
	<link rel="stylesheet" href="assets/css/footer.css"/>
	<link rel="stylesheet" href="assets/css/right-pane.css"/>
	<link rel="stylesheet" href="assets/css/main.css"/>
</head>
<body class="d-flex flex-column min-vh-100">
	<!-- navbar -->
	<nav class="navbar navbar-expand-lg navbar-light py-2 border-bottom">
		<div class="container d-flex justify-content-between align-items-center">
			<span class="navbar-brand mb-0 h1">South Africa</span>
			<div class="d-flex align-items-center gap-3">
				<input id="directory-search" type="search" inputmode="search" class="form-control form-control-sm navbar-search" placeholder="Search..." autocomplete="off" style="margin-bottom: 0; height: 32px; padding: 0 10px; font-size: 0.9rem;">
				<a href="#" class="nav-link p-0 theme-toggle" id="themeToggleLink" role="button" style="height: 32px; display: flex; align-items: center;">
					<i class="bi bi-toggle-off fs-5" style="line-height: 1;"></i>
				</a>
			</div>
		</div>
	</nav>
	<!-- content container -->
	<div class="container mt-5 flex-grow-1" id="section-container"></div>
	<!-- right pane -->
	<div class="offcanvas offcanvas-end" tabindex="-1" id="linkPane" data-bs-scroll="true" data-bs-backdrop="true">
		<div class="offcanvas-header">
			<!-- right pane close button -->
			<button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
		</div>
		<div class="offcanvas-body">
			<!-- right pane content -->
			<p class="pane-name"><span id="paneName"></span></p>
		</div>
	</div>
	<!-- footer -->
	<footer class="border-top mt-5 py-3">
		<div class="container">
			<!-- national emergency phonenumbers -->
			<div id="emergencyPhones"></div>
			<!-- geographical info -->
			<div id="footerGeography"></div>
		</div>
	</footer>
	<!-- data -->
	<script src="data/emergencyData.js"></script>
	<script src="data/geographicData.js"></script>
	<script src="data/healthcareData.js"></script>
	<script src="data/realEstateData.js"></script>
	<script src="data/wineEstateData.js"></script>
	<!-- Bootstrap -->
	<script src="assets/js/bootstrap.bundle.min.js"></script>
	<!-- site Javascript -->
	<script src="assets/js/main.js"></script>
</body>
</html>
