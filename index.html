<!DOCTYPE html>
<html lang="nl" data-bs-theme="light">
<head>

	<!-- site stylesheet -->

<body class="d-flex flex-column min-vh-100">
	<!-- navbar -->
	<nav class="navbar navbar-expand-lg navbar-light py-2 border-bottom">
		<div class="container d-flex justify-content-between align-items-center">
			<!-- logo -->
			<span class="navbar-brand mb-0 h1">South Africa</span>
			<div class="d-flex align-items-center gap-3">

				<a href="#" class="p-0" id="theme-id" role="button" style="height: 32px; display: flex; align-items: center;">

		</div>

	<div class="offcanvas offcanvas-end" tabindex="-1" id="rightpane-id" data-bs-scroll="true" data-bs-backdrop="true" data-bs-focus="false">

			<button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>

		<div class="offcanvas-body"></div>

			<div id="emergency-phones-footer-id"></div>
