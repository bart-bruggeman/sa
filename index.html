<!DOCTYPE html>
<html lang="nl" data-bs-theme="light">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SA</title>
	<!-- favicon -->
	<link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
	<!-- bootstrap -->
	<link rel="stylesheet" href="assets/css/bootstrap.min.css" />
	<link rel="stylesheet" href="assets/css/bootstrap-icons.min.css"/>
	<!-- bookmarks -->
	<link rel="stylesheet" href="assets/css/sa.css"/>
</head>
<body>
	<!-- navbar -->
	<nav class="navbar navbar-expand-lg navbar-light py-2 border-bottom">
		<div class="container d-flex justify-content-between align-items-center">
			<span class="navbar-brand mb-0 h1">SA</span>
			<div class="form-check form-switch d-flex align-items-center">
				<a href="#" class="nav-link p-0" id="themeToggleLink" role="button" style="line-height: 1;">
					<i class="bi bi-toggle-off fs-5" style="vertical-align: middle;"></i>
				</a>			
			</div>
		</div>
	</nav>
	<!-- sections container -->
	<div class="container mt-5" id="section-container"></div>
	<!-- offcanvas right/full pane -->
	<div class="offcanvas offcanvas-end" tabindex="-1" id="linkPane" data-bs-scroll="true" data-bs-backdrop="true">
		<div class="offcanvas-header">
			<!-- close button -->
			<button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas"></button>
		</div>
		<div class="offcanvas-body">
			<p class="pane-name"><span id="paneName"></span></p>
			<hr/>
			<p id="paneWebsite" style="display:none;"><span class="value"><i class="bi bi-globe icon"></i> <span class="text"></span></span></p>
			<p id="paneAddress" style="display:none;"><span class="value"><i class="bi bi-geo-alt icon"></i> <span class="text"></span></span></p>
			<p id="panePhone" style="display:none;"><span class="value"><i class="bi bi-telephone icon"></i> <span class="text"></span></span></p>
			<p id="paneMail" style="display:none;"><span class="value"><i class="bi bi-envelope icon"></i> <span class="text"></span></span></p>
		</div>
	</div>
	<!-- scripts -->
	<script src="assets/js/bootstrap.bundle.min.js"></script>
	<script src="assets/js/sa-data.js"></script>
	<script src="assets/js/sa.js"></script>
</body>
</html>
